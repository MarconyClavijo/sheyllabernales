<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La Económica Market</title>

<style>
body{
font-family: Arial;
background:#fff8dc;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:20px;
margin-bottom:20px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h1{
text-align:center;
}

button{
padding:10px 20px;
border:none;
border-radius:10px;
background:green;
color:white;
font-size:16px;
margin-top:10px;
}

input{
padding:10px;
width:60px;
font-size:16px;
}
</style>
</head>

<body>

<div class="card">
<h1>La Económica Market</h1>
<p>Control de cerveza</p>
</div>

<div class="card">
<h2>Pilsen</h2>
<p>Stock: <span id="pilsen">60</span></p>
<input type="number" id="ventaPilsen">
<button onclick="venderPilsen()">Vender</button>
</div>

<div class="card">
<h2>Cristal</h2>
<p>Stock: <span id="cristal">24</span></p>
<input type="number" id="ventaCristal">
<button onclick="venderCristal()">Vender</button>
</div>

<script>
let stockPilsen = 60;
let stockCristal = 24;

function venderPilsen(){
let cantidad = document.getElementById("ventaPilsen").value;
stockPilsen -= Number(cantidad);
document.getElementById("pilsen").innerText = stockPilsen;
}

function venderCristal(){
let cantidad = document.getElementById("ventaCristal").value;
stockCristal -= Number(cantidad);
document.getElementById("cristal").innerText = stockCristal;
}
</script>

</body>
</html>
