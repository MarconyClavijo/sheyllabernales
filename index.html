<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radio Stereo M 101.5 FM</title>
<link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--azul:#0b3d91;--amarillo:#ffd700;--rojo:#e60000;--blanco:#fff;--gris:#f5f5f5;}
*{box-sizing:border-box}
body{margin:0;font-family:Raleway,sans-serif;background:#eef4ff;color:#222}
header{background:var(--azul);padding:18px;text-align:center}
.logo{width:120px;animation:flotar 2.5s infinite}
.slogan{color:#ffd700;font-weight:bold;margin-top:8px}
.banner img{display:block;width:100%;max-height:420px;object-fit:cover}
.main{max-width:1100px;margin:auto;padding:25px;display:grid;grid-template-columns:2fr 1fr;gap:20px}
.card{background:#fff;border-radius:18px;padding:20px;box-shadow:0 5px 15px rgba(0,0,0,.15)}
audio{width:100%}
.live{color:#e60000;font-weight:bold;margin:10px 0}
#song-title{font-weight:bold;color:#0b3d91}
.buttons a{display:block;text-decoration:none;background:var(--amarillo);color:#111;padding:12px;border-radius:30px;text-align:center;margin-bottom:10px;font-weight:bold}
.events{max-width:1100px;margin:20px auto;padding:0 20px}
.events h2{text-align:center;color:#0b3d91}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:15px}
.flyer{background:#fff;border-radius:15px;padding:10px;box-shadow:0 3px 10px rgba(0,0,0,.15)}
.flyer img{width:100%;border-radius:10px}
footer{background:#0b3d91;color:#fff;text-align:center;padding:18px;margin-top:30px}
@keyframes flotar{50%{transform:translateY(-8px)}}
@media(max-width:768px){.main{grid-template-columns:1fr}}
</style>
</head>
<body>

<header>
<img class="logo" src="https://i.postimg.cc/L8bjb6K5/1687464033296.png" alt="Stereo M">
<div class="slogan">La Radio Papá 🎙️</div>
</header>

<div class="banner">
<img src="http://imgfz.com/i/fCXV3aO.jpeg" alt="Banner Stereo M">
</div>

<div class="main">
<div class="card">
<h2>🎧 Escúchanos en Vivo</h2>
<audio id="radioPlayer" controls preload="none"></audio>
<div class="live">🔴 EN VIVO</div>
<div id="song-title"><span id="sonic_title">Cargando canción...</span></div>
</div>

<div class="card buttons">
<a href="https://play.google.com/store/apps/details?id=com.innovatel.radiostereom" target="_blank">📲 Descargar App</a>
<a href="https://www.facebook.com/share/1Dib9eQUFD/" target="_blank">📘 Facebook</a>
<a href="https://wa.me/51984412853" target="_blank">🎤 WhatsApp Oyentes</a>
<a href="https://wa.me/51942883375" target="_blank">📢 Publicidad</a>
</div>
</div>

<section class="events">
<h2>🎉 Entérate de los eventos</h2>
<div class="grid">
<div class="flyer"><img src="https://via.placeholder.com/600x800?text=Flyer+1"><p>Próximamente...</p></div>
<div class="flyer"><img src="https://via.placeholder.com/600x800?text=Flyer+2"><p>Próximamente...</p></div>
<div class="flyer"><img src="https://via.placeholder.com/600x800?text=Flyer+3"><p>Próximamente...</p></div>
</div>
</section>

<footer>Diseño y desarrollo web por Marcony Clavijo | 942883375</footer>

<script>
const player=document.getElementById("radioPlayer");
const STREAM="https://sonic.globalstream.pro/8108/stream";
player.src=STREAM+"?t="+Date.now();

function updateSong(){
 if(typeof sonic_data!=="undefined" && sonic_data.songtitle){
  document.getElementById("sonic_title").textContent=sonic_data.songtitle;
 }
}
setInterval(updateSong,2000);
</script>

<script id="sonic_js" data-port="8108" src="https://sonic.globalstream.pro/cp/widgets.js?r=906"></script>

</body>
</html>
